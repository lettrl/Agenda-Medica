<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Médica</title>
    <link href="https://unpkg.com/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
        }

        header{
            
            background-color: #2389f7;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1{
            font-size: 20px;
            margin: 0;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }
        
        .search-box { 
            margin-bottom: 16px; 
            display: flex; gap: 8px; 
        }
        
        .search-box input {
            flex: 1; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px;
        }

        .search-box button {
            padding: 8px 16px; 
            background: #2c7be5; 
            color: #fff; border: none;
            border-radius: 4px; cursor: pointer;
        }

        .search-box button.secondary { 
            background: #2c7be5; 
        }
        #mensagem {
            margin-bottom: 12px; 
            padding: 10px; 
            border-radius: 4px; 
            font-size: 14px; 
            display: none;
        }
        #mensagem.info { 
            background: #e7f1ff; 
            color: #1a5bb8; 
            border: 1px solid #b8d4fa;
            display: block; }
        #mensagem.erro { 
            background: #fdecea; 
            color: #b3261e; 
            border: 1px solid #f5c6c3; 
            display: block; }

    </style>
</head>

<body>
    <header>
        <h1>Agenda Médica</h1>
        <div>
            <span style = "margin-right: 14px;" > Olá, {{ usuario }}! Seja bem-vindo(a) à nossa agenda médica. </span>
            <a href="{{ url_for('logout') }}">Sair</a>
        </div>
    </header>

    <main>
        <div class="search-box">
            <input type="text" id = "busca" placeholder="Pesquisar por nome do paciente, CPF ou nome do médico">
            <button onclick="buscar()">Buscar</button>
            <button class =  "secondary" onclick="limpar()">Limpar</button>
        </div>

        <div id="mensagem"></div>
        <div id="tabela"></div>
    </main>

    <script>
        const tabela = new Tabulator("#tabela", {
            layout: "fitColumns",
            placeholder: "Aguarde, estamos carregando os agendamentos",
            columns: [
                { title: "Data", field: "data" },
                { title: "Horário", field: "horario" },
                { title: "Nome do Paciente", field: "paciente" },
                { title: "CPF", field: "cpf" },
                { title: "Nome do Médico", field: "medico" },
                { title: "Especialidade", field: "especialidade" },
                { title: "Convênio", field: "convenio" },
                { title: "Status", field: "status"},
            ]
        });

        function mostrarMensagem(mensagem, tipo) {
            const mensagemDiv = document.getElementById("mensagem");
            if (!mensagem){
                mensagemDiv.style.display = "none";
                mensagemDiv.textContent = "";
                return;
            }
            mensagemDiv.textContent = mensagem;
            mensagemDiv.className = tipo === "erro" ? "erro" : "info";
        }

        function aplicarResposta(resposta) {
            console.log("Resposta recebida:", resposta);

            if (!resposta.sucesso) {
                mostrarMensagem(
                    "Erro ao buscar agendamentos: " + resposta.mensagem,
                    "erro"
                );

                tabela.setData([]);
                tabela.setPlaceholder("Carregamento falhou");
                return;
            }

            tabela.setData(resposta.dados || []);
}

        function carregarAgendamentos() {
            fetch("/api/agendamentos")
                .then(r => r.json())
                .then(aplicarResposta)
                .catch(() => {
                mostrarMensagem("Erro inesperado ao carregar agendamentos.", "erro");
                tabela.setData([]);
                });
    }

         function buscar() {
            const termo = document.getElementById("busca").value.trim();
            fetch("/api/agendamentos/buscar?q=" + encodeURIComponent(termo))
                .then(r => r.json())
                .then(aplicarResposta)
                .catch(() => {
                mostrarMensagem("Erro inesperado ao buscar os agendamentos.", "erro");
                tabela.setData([]);
                });
    }

        function limpar() {
            document.getElementById("busca").value = "";
            carregarAgendamentos();
    }

        document.getElementById("busca").addEventListener("keyup", (e) => {
        if (e.key === "Enter") buscar();
        });

        carregarAgendamentos();
        
    </script>
</body>
</html>
